vpn_entry_ip: "{{ hostvars['vpn-entry']['ansible_host'] }}"
vpn_exit_ip:  "{{ hostvars['vpn-exit']['ansible_host'] }}"

udp2raw_password: "{{ vault_udp2raw_password }}"
udp2raw_version: "20230206.0"
wireguard_port: 54321
# Lowered because of double encapsulation: WireGuard over udp2raw (faketcp).
# 1280 is a safe starting point; can be raised up to ~1360 as long as large packets pass.
wireguard_mtu: 1310