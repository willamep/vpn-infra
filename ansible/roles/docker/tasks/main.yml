# Install docker
- name: Remove old Docker packages
  apt:
    name:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - containerd
      - runc
    state: absent

- name: Install dependencies
  apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: yes

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0444"

- name: Add Docker repository
  copy:
    dest: /etc/apt/sources.list.d/docker.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ ansible_facts['distribution_release'] }}
      Components: stable
      Architectures: {{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' if ansible_facts['architecture'] == 'aarch64' else ansible_facts['architecture'] }}
      Signed-By: /etc/apt/keyrings/docker.asc

- name: Install Docker and Docker SDK for Python
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - python3-docker
    state: present
    update_cache: yes

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: yes

# Start wg-easy
- name: Create wg-easy directory
  file:
    path: /opt/wg-easy
    state: directory
    mode: "0755"

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: /opt/wg-easy/docker-compose.yml
    mode: "0644"
  notify: restart wg-easy

- name: Start wg-easy
  community.docker.docker_compose_v2:
    project_src: /opt/wg-easy
    state: present